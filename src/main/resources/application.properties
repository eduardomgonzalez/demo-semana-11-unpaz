spring.application.name=demo

# Esta configuracion utiliza una base H2 en archivo para conservar datos locales.
spring.datasource.url=jdbc:h2:file:./data/clientedb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

spring.jpa.show-sql=true

############################################
# Configuracion de Hibernate (JPA)
############################################

# Estrategia de modificacion de la base de datos:
#
# ddl-auto=create       -> Crea toda la estructura desde cero (borra lo anterior).
# ddl-auto=create-drop  -> Crea la base y la elimina al cerrar la aplicacion.
# ddl-auto=update       -> Intenta ajustar la base a las entidades (sin borrar datos).
# ddl-auto=none         -> No modifica nada. Se usa cuando ya existe la base.

spring.jpa.hibernate.ddl-auto=update

